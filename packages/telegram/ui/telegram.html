<!-- Run: npx vite --open telegram.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@astralibx/telegram-ui — Dev Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    alx-telegram-dashboard {
      min-height: 100vh;
      padding: 1rem;
    }
    alx-telegram-dashboard {
      --alx-primary: #d4af37;
      --alx-danger: #ef4444;
      --alx-success: #22c55e;
      --alx-warning: #f59e0b;
      --alx-info: #3b82f6;
      --alx-bg: #111;
      --alx-surface: #1a1a1a;
      --alx-border: #333;
      --alx-text: #ccc;
      --alx-text-muted: #888;
      --alx-radius: 4px;
      --alx-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
      --alx-shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <alx-telegram-dashboard theme="dark"></alx-telegram-dashboard>

  <script type="module">
    import { AlxTelegramConfig } from './src/config.ts';

    AlxTelegramConfig.setup({
      accountManagerApi: 'http://localhost:3000/api/telegram-accounts',
      ruleEngineApi: 'http://localhost:3000/api/telegram-rules',
      inboxApi: 'http://localhost:3000/api/telegram-inbox',
      botApi: 'http://localhost:3000/api/telegram-bot',
    });

    await import('./src/index.ts');
  </script>
</body>
</html>
